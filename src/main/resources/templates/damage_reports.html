<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skaderapporter</title>
    <link rel="stylesheet" th:href="@{/style.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<section class ="layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="content">
        <h1>Velkommen til skaderapporter</h1>

        <div>
            <a th:href="@{/damage-report-create}" class="btn-primary">
                + Opret skaderapport
            </a>
        </div>
        <table class="table">
            <thead>
            <tr>
                <th>Skade raport ID</th>
                <th>Afleverings Dato</th>
                <th>Raport Dato</th>
                <th>pris</th>
                <th>odometer</th>
                <th>lejeaftale ID</th>
                <th>registreret af</th>
                <th>Handling</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(damageReportList)}">
                <td colspan="10">Ingen skaderapporter fundet</td>
            </tr>
            <tr th:each="report : ${damageReportList}">
                <td th:text="${report.damgeReportId}"></td>
                <td th:text="${report.returnDate}"></td>
                <td th:text="${report.reportDate}"></td>
                <td th:text="${report.cost}"></td>
                <td th:text="${report.odometer}"></td>
                <td th:text="${report.rentalAgreementId}"></td>
                <td th:text="${report.registeredBy}"></td>
                <td>

                <form th:action="@{/add-damage-item/{id}(id=${report.damgeReportId})}" method="get" style="display: inline;">
                    <button type="submit">
                        Tilføj skade
                    </button>
                </form>

                <form th:action="@{/damage-report/{id}(id=${report.damgeReportId})}" method="get" style="display: inline;">
                    <button type="submit">
                        Vis
                    </button>
                </form>

                </td>
            </tr>
            </tbody>
        </table>

    </main>
</section>


</body>
</html>
