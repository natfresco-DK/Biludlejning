<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Brugere</title>
    <link rel="stylesheet" th:href="@{/style.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
<section class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="content">
        <h1>Opret en bruger</h1>

        <form class="user-form" th:action="@{/opret-bruger}" th:object="${user}" method="post">
            <p th:if="${successMessage}" th:text="${successMessage}" class="success-message"></p>
            <p th:if="${errorMessage}" th:text="${errorMessage}" class="error-message"></p>

            <div class="form-group">
                <label for="firstname">Fornavn</label>
                <input type="text" id="firstname" th:field="*{firstname}" required>
            </div>

            <div class="form-group">
                <label for="lastname">Efternavn</label>
                <input type="text" id="lastname" th:field="*{lastname}" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail: </label>
                <input type="email" id="email" th:field="*{email}" required>
            </div>

            <div class="form-group">
                <label for="username">Brugernavn: </label>
                <input type="text" id="username" th:field="*{username}" required>
            </div>

            <div class="form-group">
                <label for="password">Adgangskode: </label>
                <input type="password" id="password" th:field="*{password}" required>
            </div>

            <div class="form-group">
                <label for="phone">Telefon: </label>
                <input type="tel" id="phone" th:field="*{phone}" required>
            </div>
            <div class="form-group">
                <label for="role">Rolle</label>

                <select id="role" th:field="*{role}">
                    <option value="">Vælg rolle</option>

                    <option th:each="role : ${roles}"
                            th:value="${role}"
                            th:text="${role}">
                    </option>
                </select>
            </div>
            <button class="btn-primary" type="submit">Opret bruger</button>
        </form>
    </main>
</section>

</body>
</html>
