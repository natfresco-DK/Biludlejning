<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Opret lejeaftale</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<section class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="content">
        <h1>Opret lejeaftale</h1>

        <p th:if="${successMessage}" th:text="${successMessage}" class="success-message"></p>
        <p th:if="${errorMessage}" th:text="${errorMessage}" class="error-message"></p>

        <form class="lease-form" th:action="@{/lease-create}" th:object="${rentalAgreement}" method="post">

            <!-- checkbox to indicate creating a new customer -->
            <div class="customer-toggle">
                <label>
                    <input type="checkbox" id="createNewCustomer" name="createNewCustomer" value="true">
                    <span>Opret ny kunde i stedet for at vælge eksisterende</span>
                </label>
            </div>

            <!-- existing customer select -->
            <div class="form-section">
                <h3>Vælg eksisterende kunde</h3>
                <div class="form-group">
                    <label for="customer">Kunde:</label>
                    <select id="customer" th:field="*{customer}">
                        <option value="0" disabled selected>-- Vælg kunde --</option>
                        <option th:each="customer : ${customers}"
                                th:value="${customer.customerId}"
                                th:text="${customer.firstName + ' ' + customer.lastName}">
                        </option>
                    </select>
                </div>
            </div>
            <!-- form creating a new customer -->
            <div class="form-section">
                <h3>Opret ny kunde</h3>
                <div class="form-group">
                    <label for="firstName">Fornavn:</label>
                    <input type="text" id="firstName" name="newCustomerFirstName" placeholder="Fornavn">
                </div>
                <div class="form-group">
                    <label for="lastName">Efternavn:</label>
                    <input type="text" id="lastName" name="newCustomerLastName" placeholder="Efternavn">
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="newCustomerEmail" placeholder="Email">
                </div>
                <div class="form-group">
                    <label for="phone">Telefon:</label>
                    <input type="tel" id="phone" name="newCustomerPhone" placeholder="Telefon">
                </div>
                <div class="form-group">
                    <label for="licenceNo">Kørekort nr.:</label>
                    <input type="text" id="licenceNo" name="newCustomerLicenceNo" placeholder="Kørekort nr.">
                </div>
                <div class="form-group">
                    <label for="streetAddress">Adresse:</label>
                    <input type="text" id="streetAddress" name="newCustomerStreetAddress" placeholder="Gade og nr.">
                </div>
                <div class="form-group">
                    <label for="zipCode">Postnummer:</label>
                    <input type="number" id="zipCode" name="newCustomerZipCode" placeholder="Postnummer">
                </div>
                <div class="form-group">
                    <label for="city">By:</label>
                    <input type="text" id="city" name="newCustomerCity" placeholder="By">
                </div>
            </div>

            <div class="form-section">

                <div class="form-group">
                    <label for="car">Bil:</label>
                    <select id="car" th:field="*{car}" required>
                        <option value="0" disabled selected>-- Vælg bil --</option>
                        <option th:each="car : ${cars}"
                                th:value="${car.carId}"
                                th:text="${car.brand + ' ' + car.model + ' (' + car.regNr + ')'}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="startDate">Startdato:</label>
                    <input type="date" id="startDate" th:field="*{startDate}" required>
                </div>

                <div class="form-group">
                    <label for="endDate">Slutdato:</label>
                    <input type="date" id="endDate" th:field="*{endDate}" required>
                </div>

                <div class="form-group">
                    <label for="downpayment">Udbetaling:</label>
                    <input type="number" id="downpayment" th:field="*{downpayment}" min="0" step="1" required>
                </div>

                <div class="form-group">
                    <label for="monthly_payment">Månedlig betaling:</label>
                    <input type="number" id="monthly_payment" th:field="*{monthly_payment}" min="0" step="1" required>
                </div>

                <div class="form-group">
                    <label for="maxKm">Maks km:</label>
                    <input type="number" id="maxKm" th:field="*{maxKm}" min="0" step="1" required>
                </div>
            </div>

            <button class="btn-primary"  type="submit">Opret lejeaftale</button>
        </form>
    </main>
</section>

</body>
</html>
