<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/style.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
<section class ="layout">
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="content">
        <h1>Velkommen til brugere</h1>

        <form th:action="@{/opret-bruger}" th:object="${user}" method="post">
            <p th:if="${successMessage}" th:text="${successMessage}" class="success-message"></p>
            <p th:if="${errorMessage}" th:text="${errorMessage}" class="error-message"></p>

            <label for="firstname">Fornavn: </label>
            <input type="text" id="firstname" th:field="*{firstname}" required>
            <br>

            <label for="lastname">Efternavn: </label>
            <input type="text" id="lastname" th:field="*{lastname}" required>
            <br>

            <label for="email">E-mail: </label>
            <input type="email" id="email" th:field="*{email}" required>
            <br>

            <label for="username">Brugernavn: </label>
            <input type="text" id="username" th:field="*{username}" required>
            <br>

            <label for="password">Adgangskode: </label>
            <input type="password" id="password" th:field="*{password}" required>
            <br>

            <label for="phone">Telefon: </label>
            <input type="tel" id="phone" th:field="*{phone}" required>
            <br>

            <button type="submit">Opret bruger</button>
        </form>
    </main>
</section>

</body>
</html>
