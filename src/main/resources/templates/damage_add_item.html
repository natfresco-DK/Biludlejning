<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tilføj skade til skaderapport</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<section class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="content">
        <h2>Tilføj en skade</h2>

        <p th:if="${successMessage}" th:text="${successMessage}" class="success-message"></p>
        <p th:if="${errorMessage}" th:text="${errorMessage}" class="error-message"></p>

        <form th:action="@{/add-damage-item}" method="post">
            <input type="hidden" name="reportId" th:value="${reportId}"/>

            <label>Beskrivelse:
                <input type="text" name="description" required>
            </label>

            <label>Pris:
                <input type="number" step="1" min="0" name="price" required>
            </label>

            <button type="submit">Gem skade</button>
        </form>

        <br>
        <a th:href="@{/damage-reports}" class="btn-primary">Tilbage</a>
    </main>
</section>

</body>
</html>
